name: publish

on:
  push:
    tags:
      - '*'

jobs:
  publish:
    name: "Ensure GitHub Release with extension TER artifact and publishing to TER"
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Verify tag"
        run: |
          if ! [[ ${{ github.ref }} =~ ^refs/tags/[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]]; then
            echo "ERR: Invalid publish version tag: ${{ github.ref }}"
            exit 1
          fi

      - name: "Get version"
        run: echo "version=${GITHUB_REF/refs\/tags\//}" >> "$GITHUB_ENV"

      - name: "Get extension key"
        run: echo "DETECTED_EXTENSION_KEY=$(jq -r '.extra."typo3/cms"."extension-key"' composer.json)" >> "$GITHUB_ENV"

      - name: "Get comment"
        run: |
          {
            echo 'terReleaseNotes<<EOF'
            echo "https://github.com/${{ github.repository }}/releases/tag/${{ env.version }}"
            echo EOF
          } >> "$GITHUB_ENV"

      - name: "Set up PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, json, zip, curl, gd, dom
          tools: composer:v2

      - name: "Install tailor"
        run: composer global require typo3/tailor --prefer-dist --no-progress

      - name: "Set composer.json version"
        run: |
          composer config "version" "${{ env.version }}" \
          && composer config "extra"."typo3/cms"."version" "${{ env.version }}" \
          && composer validate --strict --no-check-lock --no-check-version

      # Install phpspreadsheet and its runtime dependencies into contrib/Libraries so they are bundled
      # into the classic (non-Composer) TER archive (see contrib/composer.json). --ignore-platform-reqs
      # keeps this a pure packaging step - the PHP extensions are the concern of the target instance.
      - name: "Install contrib libraries"
        run: composer install -d contrib --no-progress --ignore-platform-reqs

      # Fails when the tag does not match the version in ext_emconf.php.
      - name: "Create local TER package upload artifact"
        run: php ~/.composer/vendor/bin/tailor create-artefact ${{ env.version }} ${{ env.DETECTED_EXTENSION_KEY }}

      - name: "Create release and upload artifacts"
        uses: softprops/action-gh-release@v2
        with:
          name: "[RELEASE] ${{ env.version }}"
          generate_release_notes: true
          files: |
            tailor-version-artefact/${{ env.DETECTED_EXTENSION_KEY }}_${{ env.version }}.zip
            LICENSE
          fail_on_unmatched_files: true

      - name: "Publish to TER"
        run: |
          php ~/.composer/vendor/bin/tailor ter:publish --comment "${{ env.terReleaseNotes }}" ${{ env.version }} \
            --artefact=tailor-version-artefact/${{ env.DETECTED_EXTENSION_KEY }}_${{ env.version }}.zip
