name: tests core 13

on:
  pull_request:
  workflow_dispatch:

jobs:
  code-quality:
    name: "code quality with core v13"
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Validate composer.json"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s composer -- validate --strict --no-check-lock"

      - name: "Run PHP lint"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s lintPhp"

      - name: "Validate CGL"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s cgl -n"

      - name: "Ensure UTF-8 files do not contain BOM"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s checkBom"

      - name: "Find duplicate exception codes"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s checkExceptionCodes"

      - name: "Validate XLIFF files"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s checkIntegrityXliff"

      - name: "Validate RST files"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s checkRst"

      - name: "Lint TypoScript"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s lintTypoScript"

      - name: "Run PHPStan"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s phpstan"

  unit:
    name: "unit tests with core v13"
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.5' ]
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Unit"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s unit"

  functional:
    name: "functional tests with core v13"
    runs-on: ubuntu-22.04
    needs: code-quality
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.5' ]
        db:
          - { name: 'SQLite', options: '-d sqlite' }
          - { name: 'MariaDB', options: '-d mariadb -a mysqli' }
          - { name: 'MySQL', options: '-d mysql -a mysqli' }
          - { name: 'PostgreSQL', options: '-d postgres' }
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Prepare dependencies for TYPO3 v13"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s composerUpdate"

      - name: "Functional ${{ matrix.db.name }}"
        run: "Build/Scripts/runTests.sh -t 13 -p ${{ matrix.php-version }} -s functional ${{ matrix.db.options }}"
